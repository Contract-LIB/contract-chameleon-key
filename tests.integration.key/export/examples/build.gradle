
// List to store all creatd tasks
def tests = []

// - Counter example

def examples_counter = "examples-counter"
def counter_clib = "./export/examples/counter.clib"
def counter_replace = "./export/examples/key_replacement_counter.toml"
def client_package = "examples"

createKeYPipeline(
  examples_counter,
  key_applicant,
  counter_clib,
  counter_replace,
  client_package,
  ["example.Counter[example.Counter::init()].JML normal_behavior operation contract.0"]
).each { t -> tests << t }

createKeYPipeline(
  examples_counter,
  key_provider,
  counter_clib,
  counter_replace,
  client_package,
  []
).each { t -> tests << t }


