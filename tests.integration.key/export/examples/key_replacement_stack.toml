body = """

    private int[] comp;
    private int size;
    private final int MAX_SIZE = 1000;

    //@ public invariant this.absVal == (\\seq_def int i; 0; this.size; this.comp[i]);
    //@ public invariant \\subset(this.comp[*], this.fp);
    //@ public invariant this.size == this.absVal.length;
    //@ public invariant this.size >= 0 && this.size <= this.comp.length;
    //@ public invariant this.comp.length == 1000;
    //@ public invariant this.comp != null;

"""

init = """

      this.comp = new int[MAX_SIZE];
      this.size = 0;

      //@ set fp = \\set_union(\\all_fields(this), this.comp[*]);
      //@ set absVal = \\seq_empty;
"""

peek = """

  return this.comp[this.size-1];
"""

push = """

      this.comp[this.size] = v;
      this.size++;
    
//@ set absVal = \\seq_concat(\\old(absVal), \\seq_singleton(v));
"""

pop = """
  
    this.size--;

    //Note: don't use dl_seqRemove!
    //@ set absVal = \\seq_sub(\\old(absVal), 0, this.size);
"""

reset = """

      this.size = 0;
      //@ set absVal = \\seq_empty;
"""

