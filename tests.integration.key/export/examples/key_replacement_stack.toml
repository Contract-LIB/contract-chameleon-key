[example._Client]

file = """
package example;

public class _Client {


  /*@ normal_behavior
    requires true;
    ensures true;
    */
  public static void main(String[] args) 
  {
    testStack();
  }

  /*@ normal_behavior
    requires true;
    ensures true;
    */
  public static void testStack() 
  {
    Stack c1 = Stack.init();
    c1.push(0);
    
    int r1 = c1.peek();
    //@ assert r1 == 0;

    c1.push(1);

    int r2 = c1.peek();
    //@ assert r2 == 1;

    c1.push(2);

    int r3 = c1.peek();
    //@ assert r3 == 2;

    c1.pop();

    int r4 = c1.peek();
    //@ assert r4 == 1;

    c1.reset();
    c1.push(3);

    int r5 = c1.peek();
    //@ assert r5 == 3;
  }
}
"""
