
// List to store all creatd tasks
def tests = []
def client_package = "alias"

// - Loosing Abstraction

def loosing = "alias-loosing"
def loosing_clib = "./export/alias_problem/loosing_abstraction.clib"
def loosing_replace = "./export/alias_problem/key_replacement_loosing_abstraction.toml"

createKeYPipeline(
  loosing,
  key_applicant,
  loosing_clib,
  loosing_replace,
  client_package,
  ["alias.LoosingAbstraction[alias.LoosingAbstraction::init()].JML normal_behavior operation contract.0"]
).each { t -> tests << t }

createKeYPipeline(
  loosing,
  key_provider,
  loosing_clib,
  loosing_replace,
  client_package,
  []
).each { t -> tests << t }


